{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сброс пароля — ИС Геймификация</title>
  <link rel="stylesheet" href="{% static 'quiz_app/css/style.css' %}">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh;
      background: radial-gradient(ellipse at 50% 30%, rgba(79,142,247,.07) 0%, transparent 60%), var(--bg-deep); }
    .wrap { width:100%; max-width:400px; padding:1rem; }
    .card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-lg); padding:2rem; }
    .card-title { font-family:var(--font-display); font-size:1.3rem; font-weight:700; margin-bottom:.4rem; }
    .card-sub   { color:var(--text-secondary); font-size:.88rem; margin-bottom:1.5rem; }
  </style>
</head>
<body>
<div class="wrap">
  {% if messages %}
    {% for msg in messages %}
      <div class="alert alert-success show" style="margin-bottom:1rem">{{ msg }}</div>
    {% endfor %}
  {% endif %}
  <div class="card">
    <div class="card-title">🔑 Восстановление пароля</div>
    <div class="card-sub">Введите email — мы отправим ссылку для сброса.</div>
    <form method="post" action="{% url 'password_reset' %}">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control"
               placeholder="your@email.ru" required autofocus>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Отправить письмо</button>
    </form>
    <div style="text-align:center;margin-top:1rem">
      <a href="{% url 'login' %}" class="text-muted" style="font-size:.85rem">← Вернуться к входу</a>
    </div>
  </div>
</div>
</body>
</html>
